name: Render smoke test

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  render:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check public readiness
        run: python scripts/check_public_readiness.py

      - name: Run audits
        run: |
          python scripts/thesis_style_scan.py scan
          python scripts/thesis_consistency_audit.py
          python scripts/manuscript_concept_audit.py all --source examples/concept-drift-sample.md --concept "數位轉型" --concept "服務流程治理框架" --concept "顧客回應機制"

      - name: Render placeholder DOCX
        run: python scripts/thesis_md_pipeline_v2.py render --skip-pdf

      - name: Upload DOCX artifact
        uses: actions/upload-artifact@v4
        with:
          name: placeholder-thesis-docx
          path: deliverables/docx/thesis_render_v2_latest.docx
